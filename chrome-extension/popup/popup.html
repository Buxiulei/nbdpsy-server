<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBDpsy - 账号助手</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true"><img src="../icons/icon48.png" alt="" width="22" height="22" style="border-radius:5px;display:block"></span>
        <span class="logo-text">NBDpsy 助手</span>
      </div>
      <div class="version"></div>
    </header>

    <!-- 服务器配置：apikey 主区常驻，服务器地址折叠进高级设置 -->
    <div class="server-section">
      <label class="label">Operator API Key</label>
      <div class="input-group">
        <input type="password" id="apikey" class="input" placeholder="运营者 apikey">
        <button id="btn-save-config" class="btn btn-small">保存</button>
      </div>
      <details class="advanced-settings">
        <summary>高级设置</summary>
        <label class="label" style="margin-top: 10px;">后台服务器地址</label>
        <div class="input-group">
          <input type="text" id="server-url" class="input" placeholder="https://mcp.nbdpsy.com">
        </div>
      </details>
      <div id="server-status" class="server-status"></div>
    </div>

    <!-- 我的账号：点一张卡片即开无痕窗口注入该号 cookie 打开小红书 -->
    <div class="accounts-section">
      <div class="accounts-header">
        <label class="label">我的账号</label>
        <button id="btn-refresh-accounts" class="btn btn-small" type="button">刷新</button>
      </div>
      <div id="accounts-list" class="accounts-list">
        <div class="accounts-empty">填好 apikey 并保存后加载账号</div>
      </div>
    </div>

    <!-- 操作按钮：无痕窗口人工登录采集（加/换号唯一入口） -->
    <div class="action-section">
      <button id="btn-remote-login" class="btn btn-primary btn-large">
        <span class="btn-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="14" rx="2" />
            <path d="M8 21h8" />
            <path d="M12 18v3" />
          </svg>
        </span>
        <span class="btn-text">打开隐私窗口登录（加/换号）</span>
      </button>
    </div>

    <!-- 提示信息 -->
    <div id="message" class="message" style="display: none;"></div>

    <!-- 底部 -->
    <footer class="footer">
      <a href="#" id="btn-help">使用帮助</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
