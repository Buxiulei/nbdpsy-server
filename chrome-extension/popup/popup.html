<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBDpsy - 账号助手</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true"><img src="../icons/icon48.png" alt="" width="22" height="22" style="border-radius:5px;display:block"></span>
        <span class="logo-text">NBDpsy 助手</span>
      </div>
      <div class="version"></div>
    </header>

    <!-- 状态区域 -->
    <div class="status-section">
      <div id="status-indicator" class="status-indicator status-checking">
        <span class="status-dot"></span>
        <span class="status-text">检测中...</span>
      </div>
      <div id="cookie-count" class="cookie-count"></div>
    </div>

    <!-- 用户信息区域 -->
    <div id="user-info-section" class="user-info-section" style="display: none;">
      <div class="user-avatar">
        <img id="user-avatar" src="" alt="头像">
      </div>
      <div class="user-details">
        <div id="user-nickname" class="user-nickname">-</div>
        <div id="user-id" class="user-id">-</div>
      </div>
    </div>

    <!-- 服务器配置 -->
    <div class="server-section">
      <label class="label">后台服务器地址</label>
      <div class="input-group">
        <input type="text" id="server-url" class="input" placeholder="https://mcp.nbdpsy.com">
      </div>
      <label class="label" style="margin-top: 10px;">Operator API Key</label>
      <div class="input-group">
        <input type="password" id="apikey" class="input" placeholder="运营者 apikey">
        <button id="btn-save-config" class="btn btn-small">保存</button>
      </div>
      <div id="server-status" class="server-status"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-section">
      <button id="btn-sync" class="btn btn-primary btn-large" disabled>
        <span class="btn-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
        </span>
        <span class="btn-text">同步当前账号到后台</span>
      </button>

      <button id="btn-remote-login" class="btn btn-secondary">
        <span class="btn-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="14" rx="2" />
            <path d="M8 21h8" />
            <path d="M12 18v3" />
          </svg>
        </span>
        <span class="btn-text">远程登录采集（无痕窗口）</span>
      </button>

      <button id="btn-open-xhs" class="btn btn-secondary">
        <span class="btn-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M2 12h20" />
            <path d="M12 2a15.3 15.3 0 0 1 0 20a15.3 15.3 0 0 1 0-20z" />
          </svg>
        </span>
        <span class="btn-text">打开小红书</span>
      </button>
    </div>

    <!-- 提示信息 -->
    <div id="message" class="message" style="display: none;"></div>

    <!-- 底部 -->
    <footer class="footer">
      <a href="#" id="btn-help">使用帮助</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
