# 最小 CI：ubuntu-latest + 宿主同版本 python(3.12) + ffmpeg，跑 `pytest -m "not slow"`。
# 宿主此前无 CI，本 workflow 从零建，单 job 即可——slow 用例需真小红书账号/浏览器/GPU 编码，
# CI 里 deselect（e2e 由 lead 在生产环境手跑）。视频链非 slow 单测全 mock，ffmpeg 作安全网。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 装 Python 3.12（与宿主 venv 同版本）
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 装系统依赖 ffmpeg（视频链下载转码/配音/烧字幕/成片编码）
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 装 Python 依赖
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: 跑单测（排除 slow）
        run: pytest -m "not slow"
